<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bubble Words!</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F5C518">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bubble Words">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#F5C518;
    --sky-bot:#FFE9A8;
    --card:#ffffff;
    --ink:#274156;
    --pop-red:#FF6B6B;
    --pop-teal:#2FC9C0;
    --pop-yellow:#FFC93D;
    --pop-purple:#A78BFA;
    --pop-green:#6BCB77;
    --pop-orange:#FF9245;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{
    margin:0;height:100%;overflow:hidden;
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%, #7DCBF2 45%, var(--sky-bot) 100%);
    touch-action:none;
  }
  #sky{position:absolute;inset:0;overflow:hidden;z-index:0;}
  .cloud{
    position:absolute;background:rgba(255,255,255,.85);border-radius:50px;
    filter:blur(1px);
  }
  .cloud::before,.cloud::after{content:"";position:absolute;background:inherit;border-radius:50%;}
  .sun{
    position:absolute;top:6%;right:8%;width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFF6D0, #FFD75E 60%, #FFC53D);
    box-shadow:0 0 60px 20px rgba(255,215,94,.55);
    z-index:0;
  }
  #hill{
    position:absolute;left:-10%;right:-10%;bottom:-6%;height:22%;
    background:#8FD17A;border-radius:50% 50% 0 0 / 100% 100% 0 0;
    z-index:0;
  }

  #topbar{
    position:relative;z-index:5;
    display:flex;flex-direction:column;align-items:center;
    padding:18px 12px 6px;
  }
  h1{
    margin:0 0 10px;
    font-family:'Baloo 2',cursive;
    font-weight:800;
    font-size:clamp(24px,5vw,38px);
    color:#fff;
    text-shadow:0 3px 0 #1f7fc4, 0 6px 14px rgba(0,0,0,.25);
    letter-spacing:1px;
  }
  #subtitle{
    margin:2px 0 10px;
    font-family:'Baloo 2',cursive;
    font-weight:700;
    font-size:clamp(13px,2.6vw,18px);
    color:#FFE9A0;
    text-shadow:0 2px 0 rgba(0,0,0,.2);
    letter-spacing:3px;
    text-transform:uppercase;
  }
  #wordHint{
    font-family:'Baloo 2',cursive;
    font-weight:700;
    font-size:clamp(14px,3vw,18px);
    color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.15);
    margin-bottom:8px;
    letter-spacing:2px;
  }
  #wordCard{
    background:var(--card);
    border-radius:26px;
    padding:14px 30px;
    box-shadow:0 10px 0 rgba(0,0,0,.12), 0 16px 30px rgba(0,0,0,.18);
    display:flex;
    align-items:center;justify-content:center;
  }
  .targetWord{
    font-family:'Baloo 2',cursive;
    font-weight:800;
    font-size:clamp(28px,7vw,52px);
    color:var(--ink);
    letter-spacing:2px;
    animation:slotPop .4s ease;
  }
  @keyframes slotPop{
    0%{transform:scale(.6) rotate(-8deg);}
    60%{transform:scale(1.25) rotate(4deg);}
    100%{transform:scale(1) rotate(0);}
  }

  #hud{
    position:absolute;top:16px;left:16px;z-index:6;
    background:rgba(255,255,255,.9);
    border-radius:16px;
    padding:8px 14px;
    font-family:'Baloo 2',cursive;
    font-weight:700;
    color:var(--ink);
    font-size:15px;
    box-shadow:0 6px 0 rgba(0,0,0,.1);
    display:flex;align-items:center;gap:8px;
  }
  #hud span.star{color:#FFC93D;font-size:18px;}
  #hud span.sep{color:#c7d3db;margin:0 2px;}
  #hud span.clock{color:#4FC3F7;font-size:16px;}

  #resetBtn{
    position:absolute;top:16px;right:150px;z-index:6;
    font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;
    background:var(--pop-red);color:#fff;border:none;
    padding:10px 16px;border-radius:16px;
    box-shadow:0 6px 0 #c94848;
    cursor:pointer;
  }
  #resetBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #c94848;}

  #startStopRow{
    position:absolute;top:60px;right:16px;z-index:6;
    display:flex;gap:8px;
  }
  .runBtn{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;
    color:#fff;border:none;
    padding:10px 18px;border-radius:16px;
    cursor:pointer;
  }
  #startBtn2{background:var(--pop-green);box-shadow:0 6px 0 #4a9c53;}
  #startBtn2:active{transform:translateY(4px);box-shadow:0 2px 0 #4a9c53;}
  #stopBtn{background:#6b7280;box-shadow:0 6px 0 #454b52;}
  #stopBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #454b52;}
  .runBtn:disabled{opacity:.45;cursor:default;}
  .runBtn:disabled:active{transform:none;}

  #pausedOverlay{
    position:absolute;inset:0;z-index:40;
    pointer-events:none;
    background:rgba(20,40,60,.45);
    display:none;
    align-items:center;justify-content:center;
    font-family:'Baloo 2',cursive;font-weight:800;
    font-size:clamp(28px,7vw,48px);
    color:#fff;
    text-shadow:0 3px 0 rgba(0,0,0,.3);
  }

  #newWordBtn{
    position:absolute;top:16px;right:16px;z-index:6;
    font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;
    background:var(--pop-teal);color:#fff;border:none;
    padding:10px 16px;border-radius:16px;
    box-shadow:0 6px 0 #1e9c94;
    cursor:pointer;
  }
  #newWordBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #1e9c94;}

  #playArea{
    position:absolute;inset:0;z-index:2;
  }

  .letterBubble{
    position:absolute;
    width:var(--sz);height:var(--sz);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transform-style:preserve-3d;
    will-change:transform;
    filter:drop-shadow(0 10px 8px rgba(0,0,0,.22));
  }
  .letterBubble.wordBubble{
    width:var(--wd);
    height:calc(var(--sz) * 0.62);
  }
  .letterBubble .face{
    position:absolute;inset:0;
    border-radius:26%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2',cursive;
    font-weight:800;
    font-size:calc(var(--sz) * 0.9);
    color:#fff;
    text-shadow:0 2px 3px rgba(0,0,0,.25);
    backface-visibility:hidden;
  }
  .wordBubble .face{
    border-radius:40%;
    font-size:clamp(15px, calc(var(--sz) * 0.36), 30px);
    padding:0 8%;
    letter-spacing:1px;
  }
  .letterBubble .front{
    background:linear-gradient(145deg, var(--c1), var(--c2));
    box-shadow:inset 0 6px 10px rgba(255,255,255,.45), inset 0 -10px 14px rgba(0,0,0,.18);
  }
  .letterBubble .back{
    background:linear-gradient(145deg, var(--c2), var(--c1));
    transform:rotateY(180deg) translateZ(1px);
  }
  .letterBubble.wrong{animation:shakeNo .45s ease;}
  @keyframes shakeNo{
    0%,100%{filter:drop-shadow(0 10px 8px rgba(0,0,0,.22));}
    20%{transform:translateX(-10px) rotate(-6deg);}
    40%{transform:translateX(10px) rotate(6deg);}
    60%{transform:translateX(-6px) rotate(-3deg);}
    80%{transform:translateX(6px) rotate(3deg);}
  }
  .letterBubble.flying{
    transition:top .55s cubic-bezier(.2,.8,.3,1.4), left .55s cubic-bezier(.2,.8,.3,1.4), transform .55s ease, opacity .3s ease .3s;
    z-index:20;
  }
  .letterBubble.gone{opacity:0;pointer-events:none;}

  #banner{
    position:absolute;top:40%;left:50%;
    transform:translate(-50%,-50%) scale(.6);
    z-index:30;
    font-family:'Baloo 2',cursive;
    font-weight:800;
    font-size:clamp(30px,7vw,56px);
    color:#fff;
    text-shadow:0 4px 0 #d1490f, 0 8px 20px rgba(0,0,0,.3);
    opacity:0;
    pointer-events:none;
    white-space:nowrap;
  }
  #banner.show{
    animation:bannerPop 1.4s cubic-bezier(.2,.9,.25,1.4) forwards;
  }
  @keyframes bannerPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-6deg);}
    15%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(3deg);}
    25%{transform:translate(-50%,-50%) scale(1) rotate(0);}
    80%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-60%) scale(1.05);}
  }

  .confetti{
    position:absolute;top:-20px;
    width:10px;height:16px;
    border-radius:3px;
    z-index:25;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{transform:translateY(115vh) rotate(540deg);opacity:.9;}
  }

  #mmBubble{
    position:absolute;
    left:14px; bottom:calc(12% + 13vw + 30px);
    max-width:180px;
    background:#fff;
    border-radius:18px;
    padding:10px 14px;
    font-family:'Baloo 2',cursive;
    font-weight:700;
    font-size:14px;
    color:var(--ink);
    box-shadow:0 6px 0 rgba(0,0,0,.12), 0 10px 20px rgba(0,0,0,.18);
    z-index:16;
    opacity:0;
    transform:translateY(8px) scale(.9);
    transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
  }
  #mmBubble::after{
    content:"";
    position:absolute;
    left:28px; bottom:-10px;
    border-width:10px 8px 0 0;
    border-style:solid;
    border-color:#fff transparent transparent transparent;
  }
  #mmBubble.show{
    opacity:1;
    transform:translateY(0) scale(1);
  }

  #marshmallow{
    position:absolute;
    left:14px; bottom:12%;
    width:clamp(80px,13vw,140px);
    height:0;
    z-index:15;
    transform-origin:bottom center;
    pointer-events:none;
    animation:mmIdle 2.6s ease-in-out infinite;
  }
  #marshmallow img{
    position:absolute;bottom:0;left:0;
    width:100%;display:block;
    border-radius:18% 18% 26% 26%/22% 22% 16% 16%;
    filter:drop-shadow(0 12px 10px rgba(0,0,0,.28));
    transition:opacity .15s ease;
  }
  #marshmallow img.sadFace{opacity:0;}
  #marshmallow.isSad img.happyFace{opacity:0;}
  #marshmallow.isSad img.sadFace{opacity:1;}
  @keyframes mmIdle{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-5px) rotate(-1.5deg);}
  }
  #marshmallow.hopPulse{animation:mmHopPulse .85s cubic-bezier(.34,1.56,.64,1);}
  @keyframes mmHopPulse{
    0%{transform:translateY(0) scale(1,1);}
    20%{transform:translateY(-16px) scale(.94,1.08);}
    35%{transform:translateY(0) scale(1.08,.9);}
    55%{transform:translateY(-14px) scale(.95,1.07);}
    72%{transform:translateY(0) scale(1.06,.92);}
    100%{transform:translateY(0) scale(1,1);}
  }
  #marshmallow.jumpJoy{animation:mmJumpJoy .6s cubic-bezier(.34,1.56,.64,1) infinite;}
  @keyframes mmJumpJoy{
    0%{transform:translateY(0) scale(1,1) rotate(0deg);}
    18%{transform:translateY(6px) scale(1.1,.85) rotate(-3deg);}
    50%{transform:translateY(-62px) scale(.92,1.12) rotate(4deg);}
    82%{transform:translateY(4px) scale(1.08,.88) rotate(-2deg);}
    100%{transform:translateY(0) scale(1,1) rotate(0deg);}
  }
  #marshmallow.slouchSad{animation:mmSlouchSad 1.7s ease-in-out;}
  @keyframes mmSlouchSad{
    0%{transform:translateY(0) scale(1,1) rotate(0deg);}
    18%{transform:translateY(3px) scale(1.06,.9) rotate(-6deg);}
    45%{transform:translateY(14px) scale(1.08,.82) rotate(-11deg) translateX(-5px);}
    70%{transform:translateY(14px) scale(1.08,.82) rotate(-11deg) translateX(-5px);}
    100%{transform:translateY(0) scale(1,1) rotate(0deg);}
  }

  #startOverlay{
    position:absolute;inset:0;z-index:50;
    background:linear-gradient(180deg,var(--sky-top),#7DCBF2 60%,var(--sky-bot));
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;
    text-align:center;
    padding:20px;
  }
  #startOverlay h1{font-size:clamp(30px,8vw,52px);}
  #startOverlay p{
    font-family:'Nunito',sans-serif;font-weight:800;color:#1f4a63;
    font-size:clamp(14px,3.4vw,18px);max-width:420px;margin:0;
  }
  #startBtn{
    font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(18px,4vw,24px);
    background:var(--pop-orange);color:#fff;border:none;
    padding:16px 40px;border-radius:24px;
    box-shadow:0 8px 0 #c65f1e;
    cursor:pointer;
  }
  #startBtn:active{transform:translateY(6px);box-shadow:0 2px 0 #c65f1e;}
</style>
</head>
<body>

<div id="sky">
  <div class="sun"></div>
  <div id="hill"></div>
</div>

<div id="hud"><span class="star">&#9733;</span><span id="scoreVal">0</span> words found<span class="sep">|</span><span class="clock">&#9200;</span><span id="timerVal">00:00</span></div>
<button id="resetBtn" onclick="resetGame()">Reset &#8635;</button>
<button id="newWordBtn" onclick="skipWord()">New word &#8635;</button>
<div id="startStopRow">
  <button id="startBtn2" class="runBtn" onclick="resumeGame()">&#9654; Start</button>
  <button id="stopBtn" class="runBtn" onclick="stopGame()">&#9724; Stop</button>
</div>
<div id="pausedOverlay">Paused</div>

<div id="topbar">

  <div id="subtitle">Ages 3 to 12</div>

<script>

  tier1: ["a","and","the","to","is","it","in","up","we","go","see","my","you","he","she","can","run","big","hot","yes"],
  tier2: ["have","like","look","come","they","this","that","said","was","with","what","out","all","are","but","play","went","made","were","then"],

  tier4: ["although","because","different","important","interesting","together","something","remember","favorite","probably","especially","surprise","beautiful","natural","various"]
};
const WORDS = [].concat(SIGHT_WORDS.tier1, SIGHT_WORDS.tier2, SIGHT_WORDS.tier3, SIGHT_WORDS.tier4);

const COLORS = [
  ["#FF8A80","#FF5252"],
  ["#64FFDA","#1DE9B6"],

let currentWord = "";

let score = 0;
let bubbles = [];

let audioCtx = null;
let elapsedSeconds = 0;
let timerInterval = null;
let isRunning = false;
let playerAge = 6;
let playerName = "";

function beep(freq, dur, type, vol){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type||'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol||0.15;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function playCorrect(){ beep(660,0.12,'triangle',0.18); setTimeout(()=>beep(880,0.15,'triangle',0.18),90); }
function playWrong(){ beep(180,0.18,'sawtooth',0.12); }
function playWin(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'triangle',0.2), i*110));
}

function startGame(){
  const nameVal = document.getElementById('nameInput').value.trim();
  playerName = nameVal.slice(0, 20);
  const ageVal = parseInt(document.getElementById('ageInput').value, 10);
  playerAge = isNaN(ageVal) ? 6 : Math.max(3, Math.min(12, ageVal));
  document.getElementById('startOverlay').style.display='none';
  if(audioCtx===null){ try{audioCtx = new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  isRunning = false;
  updateRunButtons();
  nextWord();
}

function stopGame(){
  if(!isRunning) return;
  isRunning = false;
  if(timerInterval) clearInterval(timerInterval);
  document.getElementById('pausedOverlay').style.display='flex';
  updateRunButtons();
}

function resumeGame(){
  if(isRunning) return;
  if(document.getElementById('startOverlay').style.display !== 'none') return;
  document.getElementById('pausedOverlay').style.display='none';
  const namePart = playerName ? (', ' + playerName) : '';
  showMMBubble('Hi' + namePart + ', my name is Marshmallow.', 4000);
  setTimeout(()=>{
    isRunning = true;
    updateRunButtons();
    startTimer();
  }, 4000);
}

function updateRunButtons(){
  document.getElementById('startBtn2').disabled = isRunning;
  document.getElementById('stopBtn').disabled = !isRunning;
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    elapsedSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay(){
  const m = Math.floor(elapsedSeconds/60).toString().padStart(2,'0');
  const s = (elapsedSeconds%60).toString().padStart(2,'0');
  document.getElementById('timerVal').textContent = m+':'+s;
}

function resetGame(){
  score = 0;
  elapsedSeconds = 0;
  usedWords = [];
  document.getElementById('scoreVal').textContent = score;
  updateTimerDisplay();
  isRunning = true;
  document.getElementById('pausedOverlay').style.display='none';
  updateRunButtons();
  startTimer();
  skipWord();
}

/*
  Word difficulty tiers below are based on the Dolch Sight Word grade
  levels and the related U.S. Common Core reading foundational skills
  standards (CCSS.ELA-LITERACY.RF), which map roughly to these ages:

  Ages 3-4 (Pre-K / Dolch Pre-Primer level):
    No formal CCSS reading standard yet at this age.
    -> 3-letter words only, the shortest/simplest in the Dolch progression.

  Ages 5-6 (Kindergarten / Dolch Pre-Primer-Primer level):
    CCSS.ELA-LITERACY.RF.K.3c - Read common high-frequency words by sight.
    -> 3-4 letter words.

  Ages 7-8 (Grade 1-2 / Dolch 1st-2nd grade level):
    CCSS.ELA-LITERACY.RF.1.3g - Recognize and read grade-appropriate
      irregularly spelled words.
    CCSS.ELA-LITERACY.RF.2.3f - Recognize and read grade-appropriate
      irregularly spelled words.
    -> 4-5 letter words.

  Ages 9-12 (Grade 3+ / Dolch 3rd grade level and beyond):
    CCSS.ELA-LITERACY.RF.3.3d - Read grade-appropriate irregularly
      spelled words.
    -> full word list, including all 5-letter words.

  Sources: Dolch Sight Word grade-level lists (k12reader.com), and the
  Common Core State Standards Initiative, thecorestandards.org/ELA-Literacy
*/
function getWordPool(){
  if(playerAge <= 4) return SIGHT_WORDS.tier1;
  if(playerAge <= 6) return SIGHT_WORDS.tier1.concat(SIGHT_WORDS.tier2);
  if(playerAge <= 8) return SIGHT_WORDS.tier2.concat(SIGHT_WORDS.tier3);
  return SIGHT_WORDS.tier3.concat(SIGHT_WORDS.tier4);
}

function pickWord(){
  const tierWords = getWordPool();
  let pool = tierWords.filter(w=>!usedWords.includes(w));
  if(pool.length===0){ usedWords=[]; pool=tierWords; }
  const w = pool[Math.floor(Math.random()*pool.length)];
  usedWords.push(w);
  return w;
}

function nextWord(){
  currentWord = pickWord();
  renderWordCard();
  spawnBubbles();
}

function skipWord(){
  clearBubbles();
  nextWord();
}

function renderWordCard(){
  document.getElementById('wordHint').textContent = 'Find this word:';
  const card = document.getElementById('wordCard');
  card.innerHTML = '';
  const big = document.createElement('div');
  big.className = 'targetWord';
  big.textContent = currentWord.toUpperCase();
  card.appendChild(big);
}

function clearBubbles(){
  const area = document.getElementById('playArea');
  area.innerHTML = '';
  bubbles = [];
}

function spawnBubbles(){
  clearBubbles();
  const distractorCount = Math.min(6, Math.max(3, 9 - Math.floor(currentWord.length/2)));
  const allPool = getWordPool().filter(w => w !== currentWord);
  const shuffled = allPool.slice().sort(()=>Math.random()-0.5);
  const distractors = shuffled.slice(0, distractorCount);
  const pool = [currentWord].concat(distractors).sort(()=>Math.random()-0.5);

  const area = document.getElementById('playArea');
  const areaRect = area.getBoundingClientRect();
  const topSafe = 150, bottomSafe = 40;

  pool.forEach((word, idx)=>{
    const baseSize = Math.min(90, Math.max(58, areaRect.width/9));
    const width = Math.max(baseSize, baseSize * 0.55 * word.length);
    const el = document.createElement('div');
    el.className = 'letterBubble wordBubble';
    el.style.setProperty('--sz', baseSize+'px');
    el.style.setProperty('--wd', width+'px');
    const col = COLORS[Math.floor(Math.random()*COLORS.length)];
    el.style.setProperty('--c1', col[0]);
    el.style.setProperty('--c2', col[1]);
    el.innerHTML = '<div class="face front">'+word.toUpperCase()+'</div><div class="face back">'+word.toUpperCase()+'</div>';

    const x = Math.random()*(areaRect.width - width);
    const y = topSafe + Math.random()*(areaRect.height - topSafe - bottomSafe - baseSize);
    el.style.left = x+'px';
    el.style.top = y+'px';

    const state = {
      el, ch: word,
      x, y,
      vx: (Math.random()-0.5)*0.6,
      vy: (Math.random()-0.5)*0.6,
      rot: Math.random()*360,
      rotSpeed: (Math.random()-0.5)*1.2,
      bob: Math.random()*Math.PI*2,
      size: baseSize,
      alive:true
    };
    el.addEventListener('pointerdown', (e)=>{ e.preventDefault(); handlePick(state); });
    area.appendChild(el);
    bubbles.push(state);
  });
}

function handlePick(state){
  if(!state.alive || !isRunning) return;
  if(state.ch === currentWord){
    state.alive = false;
    playCorrect();
    const card = document.getElementById('wordCard');
    const cardRect = card.getBoundingClientRect();
    const areaRect = document.getElementById('playArea').getBoundingClientRect();
    state.el.classList.add('flying');
    state.el.style.left = (cardRect.left - areaRect.left + cardRect.width/2 - state.size/2) + 'px';
    state.el.style.top = (cardRect.top - areaRect.top + cardRect.height/2 - state.size/2) + 'px';
    state.el.style.transform = 'scale(0.5) rotate(360deg)';
    setTimeout(()=>{ state.el.classList.add('gone'); }, 480);
    setTimeout(()=>{ if(state.el.parentNode) state.el.parentNode.removeChild(state.el); }, 900);

    score++;
    document.getElementById('scoreVal').textContent = score;
    playWin();
    showBanner(pickPraise());
    showMMBubble(pickPraise(), 2600);
    launchConfetti();
    mmJumpForJoy();
    setTimeout(()=>{ nextWord(); }, 1400);
  } else {
    playWrong();
    state.el.classList.remove('wrong');
    void state.el.offsetWidth;
    state.el.classList.add('wrong');
    mmSlouch();
    showMMBubble(pickEncourage(), 1700);
  }
}

const PRAISE = ["Great job!","Awesome!","You got it!","Super speller!","Nice work!","Fantastic!","Woohoo!","You're a star!","Way to go!","Amazing!"];
function pickPraise(){ return PRAISE[Math.floor(Math.random()*PRAISE.length)]; }

const ENCOURAGE = ["Try again!","Almost!","Keep going!","So close!","You can do it!","Oops, try once more!"];
function pickEncourage(){ return ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)]; }

let mmTimeout = null;
function mmSetClass(cls, duration){
  const mm = document.getElementById('marshmallow');
  if(mmTimeout) clearTimeout(mmTimeout);
  mm.classList.remove('hopPulse','jumpJoy','slouchSad','isSad');
  void mm.offsetWidth;
  if(cls) mm.classList.add(cls);
  if(cls === 'slouchSad') mm.classList.add('isSad');
  if(duration){
    mmTimeout = setTimeout(()=>{
      mm.classList.remove(cls, 'isSad');
    }, duration);
  }
}
let mmBubbleTimeout = null;
function showMMBubble(text, duration){
  const b = document.getElementById('mmBubble');
  if(mmBubbleTimeout) clearTimeout(mmBubbleTimeout);
  b.textContent = text;
  b.classList.add('show');
  mmBubbleTimeout = setTimeout(()=>{ b.classList.remove('show'); }, duration || 3000);
}
function mmHop(){ mmSetClass('hopPulse', 850); }
function mmJumpForJoy(){ mmSetClass('jumpJoy', 2600); }
function mmSlouch(){ mmSetClass('slouchSad', 1700); }

function showBanner(text){
  const b = document.getElementById('banner');
  b.textContent = text;
  b.classList.remove('show');
  void b.offsetWidth;
  b.classList.add('show');
}

function launchConfetti(){
  const colors = ['#FF6B6B','#2FC9C0','#FFC93D','#A78BFA','#6BCB77','#FF9245'];
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (1.6+Math.random()*1.2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>{ if(c.parentNode) c.parentNode.removeChild(c); }, 3200);
  }
}

function animate(){
  if(!isRunning){ requestAnimationFrame(animate); return; }
  const area = document.getElementById('playArea');
  const rect = area.getBoundingClientRect();
  const topSafe = 150, bottomSafe = 40;
  bubbles.forEach(s=>{
    if(!s.alive) return;
    s.bob += 0.02;
    s.x += s.vx;
    s.y += s.vy + Math.sin(s.bob)*0.15;
    s.rot += s.rotSpeed;
    if(s.x < 0 || s.x > rect.width - s.size) s.vx *= -1;
    if(s.y < topSafe || s.y > rect.height - bottomSafe - s.size) s.vy *= -1;
    s.x = Math.max(0, Math.min(rect.width - s.size, s.x));
    s.y = Math.max(topSafe, Math.min(rect.height - bottomSafe - s.size, s.y));
    if(!s.el.classList.contains('flying')){
      s.el.style.left = s.x+'px';
      s.el.style.top = s.y+'px';
      s.el.style.transform = 'rotateY('+s.rot+'deg) rotateX('+(Math.sin(s.bob)*12)+'deg)';
    }
  });
  requestAnimationFrame(animate);
}

function makeClouds(){
  const sky = document.getElementById('sky');
  for(let i=0;i<5;i++){
    const cl = document.createElement('div');
    cl.className='cloud';
    const w = 80+Math.random()*100, h = w*0.4;
    cl.style.width=w+'px'; cl.style.height=h+'px';
    cl.style.top = (5+Math.random()*30)+'%';
    cl.style.left = (Math.random()*90)+'%';
    cl.style.opacity = 0.7+Math.random()*0.3;
    sky.appendChild(cl);
  }
}

window.addEventListener('resize', ()=>{ /* bubbles clamp themselves each frame */ });

makeClouds();
animate();
updateRunButtons();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
